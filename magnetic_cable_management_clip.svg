<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00050f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8b3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#00f5ff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#00f5ff" stroke-width="0.5"/>
  </g>
  
  <!-- Main 3D Clip Design -->
  <g transform="translate(200, 180)">
    <!-- Magnetic base (circular) -->
    <ellipse cx="0" cy="15" rx="45" ry="8" fill="#00f5ff" opacity="0.2" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#cyanGlow)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="30" fill="#00050f" stroke="#00f5ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="url(#cyanGlow)" opacity="0.6"/>
    
    <!-- Magnetic field lines -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.2" stroke-dasharray="3,3"/>
    
    <!-- Cable clip arms (3D perspective) -->
    <g filter="url(#glow)">
      <!-- Left arm -->
      <path d="M -35,-20 L -50,-60 L -40,-80 L -25,-40 Z" fill="url(#cyanGlow)" opacity="0.8"/>
      <path d="M -35,-20 L -50,-60 L -40,-80 L -25,-40 Z" fill="none" stroke="#00f5ff" stroke-width="2"/>
      
      <!-- Right arm -->
      <path d="M 35,-20 L 50,-60 L 40,-80 L 25,-40 Z" fill="url(#cyanGlow)" opacity="0.8"/>
      <path d="M 35,-20 L 50,-60 L 40,-80 L 25,-40 Z" fill="none" stroke="#00f5ff" stroke-width="2"/>
      
      <!-- Center arm -->
      <path d="M -8,-25 L -10,-85 L 10,-85 L 8,-25 Z" fill="url(#cyanGlow)" opacity="0.9"/>
      <path d="M -8,-25 L -10,-85 L 10,-85 L 8,-25 Z" fill="none" stroke="#00f5ff" stroke-width="2"/>
      
      <!-- Cable representation -->
      <ellipse cx="0" cy="-75" rx="15" ry="6" fill="#00f5ff" opacity="0.4"/>
      <rect x="-12" y="-75" width="24" height="30" rx="12" fill="#00f5ff" opacity="0.3"/>
    </g>
    
    <!-- Geometric accent lines -->
    <line x1="-70" y1="-50" x2="-50" y2="-60" stroke="#00f5ff" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
    <line x1="70" y1="-50" x2="50" y2="-60" stroke="#00f5ff" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
  </g>
  
  <!-- Decorative corner elements -->
  <g opacity="0.6">
    <polyline points="20,20 20,40 40,40" fill="none" stroke="#00f5ff" stroke-width="2"/>
    <polyline points="380,20 380,40 360,40" fill="none" stroke="#00f5ff" stroke-width="2"/>
  </g>
  
  <!-- Price Badge -->
  <g transform="translate(330, 50)">
    <circle cx="0" cy="0" r="35" fill="url(#goldGradient)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="32" fill="#1a0f00" stroke="#ffd700" stroke-width="2"/>
    <text x="0" y="-5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffd700" text-anchor="middle">ONLY</text>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffd700" text-anchor="middle">$2.99</text>
  </g>
  
  <!-- Product Name -->
  <g transform="translate(200, 320)">
    <text x="0" y="0" font-family="Orbitron, Arial, sans-serif" font-size="18" font-weight="bold" fill="#00