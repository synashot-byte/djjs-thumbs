<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00050f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001a2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00a8b8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00f5ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#00f5ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#00f5ff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#00f5ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#00f5ff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#00f5ff" stroke-width="1"/>
  </g>
  
  <!-- 3D Card Stand Representation -->
  <g transform="translate(200, 180)">
    <!-- Base platform -->
    <g filter="url(#glow)">
      <polygon points="-80,50 -60,60 60,60 80,50" fill="#00f5ff" opacity="0.3"/>
      <polygon points="-80,50 -60,60 -60,65 -80,55" fill="#00a8b8" opacity="0.4"/>
      <polygon points="80,50 60,60 60,65 80,55" fill="#00a8b8" opacity="0.4"/>
    </g>
    
    <!-- Display stand back panel -->
    <g filter="url(#glow)">
      <polygon points="-50,50 -40,-50 40,-50 50,50" fill="url(#cyanGlow)" opacity="0.2" stroke="#00f5ff" stroke-width="2"/>
      <polygon points="-40,-50 -35,-55 35,-55 40,-50" fill="#00f5ff" opacity="0.3"/>
      <polygon points="40,-50 35,-55 35,45 40,50" fill="#00a8b8" opacity="0.4"/>
    </g>
    
    <!-- Front support strut left -->
    <polygon points="-45,50 -40,45 -40,-45 -45,-40" fill="#00f5ff" opacity="0.6" filter="url(#softGlow)"/>
    
    <!-- Front support strut right -->
    <polygon points="45,50 40,45 40,-45 45,-40" fill="#00f5ff" opacity="0.6" filter="url(#softGlow)"/>
    
    <!-- Pokemon card representation -->
    <g transform="translate(0, -5)">
      <rect x="-25" y="-35" width="50" height="70" rx="3" fill="#1a1a2e" stroke="#00f5ff" stroke-width="1.5" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#00f5ff" stroke-width="1.5" opacity="0.8"/>
      <circle cx="0" cy="0" r="8" fill="#00f5ff" opacity="0.3"/>
      <rect x="-20" y="20" width="40" height="3" rx="1" fill="#00f5ff" opacity="0.5"/>
      <rect x="-15" y="26" width="30" height="2" rx="1" fill="#00f5ff" opacity="0.4"/>
    </g>
    
    <!-- Accent lines -->
    <line x1="-35" y1="-30" x2="-35" y2="30" stroke="#00f5ff" stroke-width="1" opacity="0.6" filter="url(#softGlow)"/>
    <line x1="35" y1="-30" x2="35" y2="30" stroke="#00f5ff" stroke-width="1" opacity="0.6" filter="url(#softGlow)"/>
  </g>
  
  <!-- Glowing corner accents -->
  <g opacity="0.6" filter="url(#glow)">
    <polyline points="20,20 20,40 40,40" fill="none" stroke="#00f5ff" stroke-width="2"/>
    <polyline points="380,20 380,40 360,40" fill="none" stroke="#00f5ff" stroke-width="2"/>
    <polyline points="20,380 20,360 40,360" fill="none" stroke="#00f5ff" stroke-width="2"/>
    <polyline points="380,380 380,360 360,360" fill="none" stroke="#00f5ff" stroke-width="2"/>
  </g>
  
  <!-- Product Name -->
  <text x="200" y="320" font-family="Orbitron, Arial, sans-serif" font-size="16" font-weight="700" fill="#00f5ff" text-anchor="middle" filter="url(#softGlow)">
    TCG POKEMON CARD
  </text>
  <text x="200" y="338" font-family="Orbitron, Arial, sans-serif" font-size="14" font-weight="600" fill="#00d4e0" text-anchor="middle">
    GRADING DISPLAY STAND
  </text>
  
  <!-- Price Badge -->
  <g transform="translate(320, 50)">
    <circle cx="0" cy="0" r="35" fill="url(#goldGrad)" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="32" fill="#00050f" opacity="0.3