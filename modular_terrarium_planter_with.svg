<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00050f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#001a2e;stop-opacity:1"/>
    </linearGradient>
    
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00a8b8;stop-opacity:0.4"/>
    </linearGradient>
    
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Abstract geometric grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="400" y2="100" stroke="#00f5ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#00f5ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="400" y2="300" stroke="#00f5ff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#00f5ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#00f5ff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#00f5ff" stroke-width="1"/>
  </g>
  
  <!-- 3D Terrarium Structure -->
  <g filter="url(#glow)">
    <!-- Base platform -->
    <polygon points="200,280 280,240 280,250 200,290 120,250 120,240" fill="#00f5ff" opacity="0.2"/>
    <polygon points="200,290 280,250 280,260 200,300 120,260 120,250" fill="url(#cyanGlow)" opacity="0.3"/>
    
    <!-- Main hexagonal planter body -->
    <polygon points="200,160 260,130 280,180 260,230 200,260 140,230 120,180 140,130" fill="#001a2e" stroke="#00f5ff" stroke-width="2" opacity="0.8"/>
    
    <!-- Inner hexagon detail -->
    <polygon points="200,180 240,160 250,190 240,220 200,240 160,220 150,190 160,160" fill="#00050f" stroke="#00f5ff" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Drainage holes -->
    <circle cx="200" cy="240" r="6" fill="#00f5ff" opacity="0.6"/>
    <circle cx="180" cy="230" r="4" fill="#00f5ff" opacity="0.5"/>
    <circle cx="220" cy="230" r="4" fill="#00f5ff" opacity="0.5"/>
    
    <!-- Modular connection points -->
    <circle cx="140" cy="130" r="5" fill="#00f5ff" stroke="#00f5ff" stroke-width="2" filter="url(#strongGlow)"/>
    <circle cx="260" cy="130" r="5" fill="#00f5ff" stroke="#00f5ff" stroke-width="2" filter="url(#strongGlow)"/>
    <circle cx="280" cy="180" r="5" fill="#00f5ff" stroke="#00f5ff" stroke-width="2" filter="url(#strongGlow)"/>
    
    <!-- Top rim glow -->
    <ellipse cx="200" cy="155" rx="65" ry="12" fill="none" stroke="#00f5ff" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
    
    <!-- Plant representation - abstract leaves -->
    <path d="M 200,140 Q 180,110 175,90" fill="none" stroke="#00f5ff" stroke-width="2.5" opacity="0.7"/>
    <path d="M 200,140 Q 210,115 220,95" fill="none" stroke="#00f5ff" stroke-width="2.5" opacity="0.7"/>
    <path d="M 200,140 Q 195,120 190,100" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.6"/>
    
    <!-- Leaf details -->
    <ellipse cx="175" cy="95" rx="8" ry="15" fill="#00f5ff" opacity="0.3" transform="rotate(-20 175 95)"/>
    <ellipse cx="220" cy="100" rx="8" ry="15" fill="#00f5ff" opacity="0.3" transform="rotate(15 220 100)"/>
  </g>
  
  <!-- Accent lines -->
  <line x1="120" y1="180" x2="80" y2="160" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  <line x1="280" y1="180" x2="320" y2="160" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
  <circle cx="80" cy="160" r="3" fill="#00f5ff" opacity="0.6"/>
  <circle cx="320" cy="160" r="3" fill="#00f5ff" opacity="0.6"/>
  
  <!-- Price Badge -->
  <g filter="url(#glow)">
    <circle cx="330" cy="70" r="35" fill="url(#goldGrad)"/>
    <circle cx="330" cy="70" r="32" fill="#00050f" opacity="0.3"/>
    <text x="330" y="67" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffd700" text-anchor="middle">STL</text>
    <text x="330" y="82" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffd700" text-anchor="middle">$3.49</text>
  </g>
  
  <!-- Product Name -->
  <text x="200" y="335" font-family="Orbitron, sans-serif" font