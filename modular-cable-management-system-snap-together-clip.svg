  </text>
  
  <g transform="translate(200, 220)">
    <circle cx="0" cy="0" r="85" fill="none" stroke="#00f5ff" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.2"/>
    
    <path d="M -60,-30 L -60,-10 L -50,0 L -60,10 L -60,30 L -40,30 L -30,20 L -30,-20 L -40,-30 Z" fill="#00f5ff" opacity="0.8" filter="url(#glow)"/>
    <rect x="-58" y="-25" width="8" height="50" fill="#0a0a1a"/>
    <circle cx="-54" cy="-15" r="3" fill="#00f5ff"/>
    <circle cx="-54" cy="0" r="3" fill="#00f5ff"/>
    <circle cx="-54" cy="15" r="3" fill="#00f5ff"/>
    
    <path d="M -20,-30 L -20,-10 L -10,0 L -20,10 L -20,30 L 0,30 L 10,20 L 10,-20 L 0,-30 Z" fill="#00f5ff" opacity="0.6"/>
    <rect x="-18" y="-25" width="8" height="50" fill="#0a0a1a"/>
    <circle cx="-14" cy="-15" r="3" fill="#00f5ff"/>
    <circle cx="-14" cy="0" r="3" fill="#00f5ff"/>
    <circle cx="-14" cy="15" r="3" fill="#00f5ff"/>
    
    <path d="M 20,-30 L 20,-10 L 30,0 L 20,10 L 20,30 L 40,30 L 50,20 L 50,-20 L 40,-30 Z" fill="#00f5ff" opacity="0.4"/>
    <rect x="22" y="-25" width="8" height="50" fill="#0a0a1a"/>
    <circle cx="26" cy="-15" r="3" fill="#00f5ff"/>
    <circle cx="26" cy="0" r="3" fill="#00f5ff"/>
    <circle cx="26" cy="15" r="3" fill="#00f5ff"/>
    
    <rect x="-70" y="-5" width="150" height="4" fill="url(#cableGrad)" rx="2"/>
    <rect x="-70" y="5" width="150" height="3" fill="url(#cableGrad)" rx="1.5" opacity="0.6"/>
    <rect x="-70" y="-12" width="150" height="3" fill="url(#cableGrad)" rx="1.5" opacity="0.6"/>
