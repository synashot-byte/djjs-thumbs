<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00050f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <text x="200" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Modular Cable
  </text>
  <text x="200" y="75" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Management System
  </text>
  
  <g transform="translate(200, 210)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#00f5ff" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#00f5ff" stroke-width="2" filter="url(#glow)"/>
    
    <rect x="-60" y="-30" width="120" height="20" rx="10" fill="none" stroke="#00f5ff" stroke-width="3" filter="url(#glow)"/>
    
    <path d="M -50,-10 L -50,10 L -40,10 L -40,-10 Z" fill="#00f5ff" opacity="0.8"/>
    <path d="M -20,-10 L -20,10 L -10,10 L -10,-10 Z" fill="#00f5ff" opacity="0.8"/>
    <path d="M 10,-10 L 10,10 L 20,10 L 20,-10 Z" fill="#00f5ff" opacity="0.8"/>
    <path d="M 40,-10 L 40,10 L 50,10 L 50,-10 Z" fill="#00f5ff" opacity="0.8"/>
    
    <path d="M -30,-30 Q -30,-45 -15,-45 L 15,-45 Q 30,-45 30,-30" fill="none" stroke="#00f5ff" stroke-width="2.5" opacity="0.6"/>
    <path d="M -30,30 Q -30,45 -15,45 L 15,45 Q 30,45 30,30" fill="none" stroke="#00f5ff" stroke-width="2.5" opacity="0.6"/>
    
    <circle cx="-45" cy="0" r="8" fill="#00f5ff" opacity="0.9" filter="url(#glow)"/>
    <circle cx="45" cy="0" r="8" fill="#00f5ff" opacity="0.9" filter="url(#glow)"/>
    
    <path d="M -65,-5 L -55,-5 L -50,0 L -55,5 L -65,5 Z" fill="#00f5ff" opacity="0.7"/>
    <path d="M 65,-5 L 55,-5 L 50,0 L 55,5 L 65,5 Z" fill="#00f5ff" opacity="0.7"/>
  </g>
  
  <rect x="280" y="320" width="100" height="35" rx="17.5" fill="#ffd700" filter="url(#goldGlow)"/>
  <text x="330" y="343" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0a0a1a" text-anchor="middle">
    $2.99
  </text>
  
  <text x="385" y="390" font-family="Arial, sans-serif" font-size="14" fill="#00f5ff" text-anchor="end" opacity="0.9">
    DesignzByJJS
  </text>
</svg>